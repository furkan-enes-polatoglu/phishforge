services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phishforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phishforge}
      POSTGRES_DB: ${POSTGRES_DB:-phishforge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phishforge}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrate:
    build: .
    command: ["migrate"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-phishforge}:${POSTGRES_PASSWORD:-phishforge}@postgres:5432/${POSTGRES_DB:-phishforge}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    command: ["api"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-phishforge}:${POSTGRES_PASSWORD:-phishforge}@postgres:5432/${POSTGRES_DB:-phishforge}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${ADMIN_PORT:-8080}:8080"
      - "${PHISH_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build: .
    command: ["worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-phishforge}:${POSTGRES_PASSWORD:-phishforge}@postgres:5432/${POSTGRES_DB:-phishforge}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
